<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Huddle landing page with single introductory section</title>

  <link rel="stylesheet" href="style.css">
  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>

  <script src="https://kit.fontawesome.com/5ea9af86c3.js" crossorigin="anonymous"></script>


</head>
<body>

<main class="background__image__div">
  <article class="huddle__page">
    <nav class="huddle__nav">
      <img src="./images/logo.svg" alt="logo">
    </nav>

   <section class="hero">
       <section class="hero__image">
          <img src="./images/illustration-mockups.svg" alt="illustration-mockup">
        </section>

        <section class="huddle__info">
          <section class="hero__description">
            <p class="hero__title">Build The Community  Your Fans will love</p>
            <p class="hero__para base-font-size"> 
              Huddle re-imagines the way we build communities.You have a voice,
              but so does your audience. Create connections with your users as you engage in 
              gnuiner discussion.
            </p>
            <button class="btn base-font-size"><span class="front-layer">Register</span></button>
          </section>

        <section class="icon-section">
           <a><i class="fa-brands fa-facebook fa-xl changes-color"></i></a>
            <a> <i class="fa-brands fa-twitter fa-xl"></i></a>
            <a><i class="fa-brands fa-instagram  fa-xl"></i></a>
        </section>
   
    </section>
   </section>
</article>
</main>


  


 

</body>
</html>
